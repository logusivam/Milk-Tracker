    <div

      style='font-family: "Plus Jakarta Sans", "Noto Sans", sans-serif;'
    >
      <div>
        <div class="flex items-center bg-[#1a1a1a] p-4 pb-2 justify-between">

            </svg>
          </div>
          <h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Monthly Summary</h2>
        </div>
        <div class="p-4">
          <select id="durationSelect" class="bg-[#1a1a1a] text-white px-4 py-2 rounded-md w-full"><!-- js will render --></select>
        </div>
        <div class="flex flex-wrap gap-4 p-4">
          <div class="flex min-w-[158px] flex-1 flex-col gap-2 rounded-xl p-6 bg-[#363636]">
            <p class="text-white text-base font-medium leading-normal">Total Litres</p>
            <p id="totalLitres" class="text-white tracking-light text-2xl font-bold leading-tight">--</p>
          </div>
          <div class="flex min-w-[158px] flex-1 flex-col gap-2 rounded-xl p-6 bg-[#363636]">
            <p class="text-white text-base font-medium leading-normal">Total Cost</p>
            <p id="totalCost" class="text-white tracking-light text-2xl font-bold leading-tight">--</p>
          </div>
        </div>
        <div class="flex flex-wrap gap-4 px-4 py-6">
          <div class="flex min-w-72 flex-1 flex-col gap-2">
            <p class="text-white text-base font-medium leading-normal">Daily Consumption</p>
            <div id="dailyConsumptionGraph" class="grid min-h-[180px] grid-flow-col auto-cols-[32px] gap-4
                     grid-rows-[1fr_auto] items-end justify-items-center
                     px-3 overflow-x-auto overflow-y-visible">
            </div>
            <p id="historyPlaceholder" class="px-4 py-10 text-center text-[#adadad] text-sm">
              Select a duration above to view consumption history
            </p>
          </div>
        </div>
        <h3 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Daily Breakdown</h3>
        <div id="dailyBreakdown">
          <p id="historyPlaceholder" class="px-4 py-10 text-center text-[#adadad] text-sm">
            Select a duration above to view dailyBreakdown history
          </p>
        </div>
      </div>
